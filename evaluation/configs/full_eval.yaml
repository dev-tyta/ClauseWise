# Full evaluation configuration — runs all retrieval configs and generation variants
# on the 50 benchmark clauses and computes all metrics.

benchmark_path: data/benchmark/benchmark.jsonl
evidence_corpus_path: data/evidence_corpus/evidence.jsonl
risk_ontology_path: data/ontology/risk_ontology.yaml

output:
  results_dir: evaluation/results
  figures_dir: evaluation/figures
  tables_dir: evaluation/tables

retrieval:
  configs: [1, 2, 3, 4, 5]
  k_values: [1, 3, 5, 10]

generation:
  variants: [1, 2, 3, 4, 5]
  model: gpt-4o-mini

verification:
  fidelity_threshold: 0.7
  nli_weight: 0.4
  llm_judge_weight: 0.6

metrics:
  readability: true
  ragas: true
  semantic_similarity: true
  hallucination: true
  risk_classification: true

figures:
  format: [png, pdf]
  dpi: 300

tables:
  format: [latex, markdown, csv]
